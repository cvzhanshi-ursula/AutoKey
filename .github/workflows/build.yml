name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    runs-on: windows-latest   # 使用 GitHub 免费的 Windows 运行环境

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install pyautogui pyinstaller

      - name: 打包为单文件 EXE
        run: pyinstaller --onefile auto_key.py

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: auto_key_windows
          path: dist/auto_key.exe
